<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="cadastro-page">


     <div class="cadastro-box">

    <form>

        <!--cabeçalho-->
        <h1>Cadastro de novo usuário</h1>

        <!-- NOME + SOBRENOME -->
        <div class="linha-nome">
            <div class="campo">
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Digite aqui">
            </div>

            <div class="campo">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" placeholder="Digite aqui">
            </div>
        </div>

        <label for="cpf">CPF</label><br>
        <input type="text" id="cpf" placeholder="Digite aqui"><br>

        <label for="telefone">Telefone</label><br>
        <input type="tel" id="telefone" placeholder="(99)9999-9999"><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" placeholder="Email"><br>

        <label for="password">Senha</label><br>
        <input type="password" id="password" placeholder="Digite aqui"><br>

        <button>Envie</button>

    </form>

</div>

    </body>

</html
